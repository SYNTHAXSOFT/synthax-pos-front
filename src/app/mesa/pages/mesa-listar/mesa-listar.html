<div class="container-fluid px-4">
  <h2 class="mb-2">Lista de Mesas</h2>
  <hr class="mb-4">

  @if (cargando) {
    <div class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (!cargando) {
    <div class="table-responsive">
      <table class="table table-striped table-hover table-bordered">
        <thead class="table-light">
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (mesa of mesas; track mesa.id) {
            <tr>
              <td>{{ mesa.codigo }}</td>
              <td>{{ mesa.nombre }}</td>
              <td>
                <span [class]="mesa.activo ? 'badge bg-success' : 'badge bg-danger'">
                  {{ mesa.activo ? 'Activa' : 'Inactiva' }}
                </span>
              </td>
              <td>
                <button class="btn btn-info btn-sm me-1" (click)="editar(mesa.id)">
                  Editar
                </button>
                <button
                  class="btn btn-warning btn-sm"
                  (click)="desactivar(mesa.id)"
                  [disabled]="!mesa.activo"
                >
                  Desactivar
                </button>
              </td>
            </tr>
          }
          @empty {
            <tr>
              <td colspan="4" class="text-center text-muted py-4">
                No hay mesas registradas
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
