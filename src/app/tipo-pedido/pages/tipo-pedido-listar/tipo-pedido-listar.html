<div class="container-fluid px-4">
  <h2 class="mb-2">Lista de Tipos de Pedido</h2>
  <hr class="mb-4">

  @if (cargando) {
    <div class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (!cargando) {
    <div class="table-responsive">
      <table class="table table-striped table-hover table-bordered">
        <thead class="table-light">
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (tipo of tiposPedido; track tipo.id) {
            <tr>
              <td>{{ tipo.codigo }}</td>
              <td>{{ tipo.nombre }}</td>
              <td>
                <span [class]="tipo.activo ? 'badge bg-success' : 'badge bg-danger'">
                  {{ tipo.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td>
                <button class="btn btn-info btn-sm me-1" (click)="editar(tipo.id)">
                  Editar
                </button>
                <button
                  class="btn btn-warning btn-sm"
                  (click)="desactivar(tipo.id)"
                  [disabled]="!tipo.activo"
                >
                  Desactivar
                </button>
              </td>
            </tr>
          }
          @empty {
            <tr>
              <td colspan="4" class="text-center text-muted py-4">
                No hay tipos de pedido registrados
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
