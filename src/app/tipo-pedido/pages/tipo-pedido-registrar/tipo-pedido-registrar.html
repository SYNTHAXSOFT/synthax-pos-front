<h2 class="mb-2">{{ editando ? 'Editar Tipo de Pedido' : 'Registrar Tipo de Pedido' }}</h2>
<hr class="mb-4">

<div class="container" style="max-width: 88rem;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form [formGroup]="myForm" (ngSubmit)="onSave()">

        <div class="row g-3">
          <!-- Código -->
          <div class="col-md-4">
            <label class="form-label">Código <span class="text-danger">*</span></label>
            <input type="text" formControlName="codigo" class="form-control"
                   placeholder="Ej: DOMICILIO" />
            @if (isValidField('codigo')) {
              <div class="text-danger small mt-1">{{ getFieldError('codigo') }}</div>
            }
          </div>

          <!-- Nombre -->
          <div class="col-md-8">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre" class="form-control"
                   placeholder="Ej: Domicilio, Mesa, Para llevar" />
            @if (isValidField('nombre')) {
              <div class="text-danger small mt-1">{{ getFieldError('nombre') }}</div>
            }
          </div>

          <!-- Activo -->
          <div class="col-12">
            <div class="form-check">
              <input type="checkbox" formControlName="activo" class="form-check-input" id="activoTipo" />
              <label class="form-check-label" for="activoTipo">Activo</label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          @if (editando) {
            <button type="button" class="btn btn-secondary px-4" (click)="resetForm()">
              Cancelar
            </button>
          }
          <button type="submit" class="btn btn-primary px-4">
            {{ editando ? 'Actualizar' : 'Guardar' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tabla de tipos de pedido -->
  <div class="mt-4">
    <app-tipo-pedido-listar></app-tipo-pedido-listar>
  </div>
</div>
