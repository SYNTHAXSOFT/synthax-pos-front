<h2 class="mb-2">{{ editando ? 'Editar' : 'Nuevo' }} Insumo</h2>
<hr class="mb-4">

<div class="container" style="max-width: 88rem;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form [formGroup]="myForm" (ngSubmit)="onSave()">
        <div class="row g-3">

          <!-- Código -->
          <div class="col-md-3">
            <label class="form-label">Código <span class="text-danger">*</span></label>
            <input type="text" formControlName="codigo" class="form-control"
                   placeholder="INS-001" [class.is-invalid]="isValidField('codigo')">
            @if (isValidField('codigo')) {
              <div class="invalid-feedback">Código obligatorio (mín. 2 caracteres)</div>
            }
          </div>

          <!-- Descripción -->
          <div class="col-md-6">
            <label class="form-label">Descripción <span class="text-danger">*</span></label>
            <input type="text" formControlName="descripcion" class="form-control"
                   placeholder="Nombre del insumo..." [class.is-invalid]="isValidField('descripcion')">
            @if (isValidField('descripcion')) {
              <div class="invalid-feedback">Descripción obligatoria</div>
            }
          </div>

          <!-- Restaurante -->
          <div class="col-md-3">
            <label class="form-label">Restaurante <span class="text-danger">*</span></label>
            <select formControlName="restauranteId" class="form-select"
                    [class.is-invalid]="isValidField('restauranteId')">
              <option [value]="null">Seleccione...</option>
              @for (r of restaurantes; track r.id) {
                <option [value]="r.id">{{ r.nombre }}</option>
              }
            </select>
            @if (isValidField('restauranteId')) {
              <div class="invalid-feedback">Restaurante obligatorio</div>
            }
          </div>

          <!-- Stock inicial -->
          <div class="col-md-3">
            <label class="form-label">Stock inicial</label>
            <input type="number" formControlName="stock" class="form-control"
                   min="0" step="0.01" placeholder="0">
          </div>

          <!-- Unidad de medida -->
          <div class="col-md-3">
            <label class="form-label">Unidad de medida <span class="text-danger">*</span></label>
            <select formControlName="medida" class="form-select"
                    [class.is-invalid]="isValidField('medida')">
              @for (m of medidas; track m) {
                <option [value]="m">{{ m }}</option>
              }
            </select>
          </div>

          <!-- Activo -->
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="activo" id="activoInsumo">
              <label class="form-check-label" for="activoInsumo">Activo</label>
            </div>
          </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          @if (editando) {
            <button type="button" class="btn btn-secondary" (click)="resetForm()">
              Cancelar
            </button>
          }
          <button type="submit" class="btn btn-primary px-4">
            {{ editando ? 'Actualizar' : 'Crear Insumo' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Lista -->
  <div class="mt-4">
    <app-insumo-listar></app-insumo-listar>
  </div>
</div>
