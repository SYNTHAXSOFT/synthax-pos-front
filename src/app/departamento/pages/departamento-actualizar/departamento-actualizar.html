<div class="spx-form-page">
  <div class="spx-form-card">

    <div class="spx-form-card__header">
      <div class="spx-form-card__header-icon">
        <i class="fa-solid fa-map-location-dot"></i>
      </div>
      <div>
        <h2 class="spx-form-card__title">Actualizar Departamento</h2>
        <p class="spx-form-card__subtitle">Modifica los datos del departamento</p>
      </div>
    </div>

    @if (cargando) {
      <div class="spx-form-loading">
        <div class="spx-form-spinner"></div>
        <p>Cargando datos...</p>
      </div>
    }

    @if (!cargando) {
      <form (ngSubmit)="actualizarDepartamento()" class="spx-form-body">
        <div class="spx-form-grid spx-form-grid--3">

          <div class="spx-form-field">
            <label class="spx-form-label">Código</label>
            <input type="text" class="spx-form-input spx-form-input--readonly"
                   [(ngModel)]="departamento.id" name="id" readonly>
            <span class="spx-form-hint-text">El código no puede modificarse.</span>
          </div>

          <div class="spx-form-field spx-form-col-span-2">
            <label class="spx-form-label">
              Nombre <span class="spx-form-required">*</span>
            </label>
            <input type="text" class="spx-form-input"
                   [(ngModel)]="departamento.nombre" name="nombre" required
                   placeholder="Nombre del departamento">
          </div>

        </div>

        <div class="spx-form-check">
          <input type="checkbox" class="spx-form-check__input" id="activoActDepto"
                 [(ngModel)]="departamento.activo" name="activo">
          <label class="spx-form-check__label" for="activoActDepto">
            <i class="fa-solid fa-circle-check"></i>
            Departamento activo
          </label>
        </div>

        <div class="spx-form-actions">
          <button type="button" class="spx-form-btn-cancel" (click)="cancelar()">
            <i class="fa-solid fa-arrow-left"></i>
            Cancelar
          </button>
          <button type="submit" class="spx-form-btn-submit">
            <i class="fa-solid fa-floppy-disk"></i>
            Actualizar
          </button>
        </div>

      </form>
    }
  </div>
</div>
