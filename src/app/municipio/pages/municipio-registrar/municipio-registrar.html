<div class="spx-form-page">

  <!-- Form card -->
  <div class="spx-form-card spx-form-card--wide">

    <div class="spx-form-card__header">
      <div class="spx-form-card__header-icon">
        <i class="fa-solid fa-city"></i>
      </div>
      <div>
        <h2 class="spx-form-card__title">Registrar Municipio</h2>
        <p class="spx-form-card__subtitle">Agrega un nuevo municipio vinculado a un departamento</p>
      </div>
    </div>

    <form [formGroup]="myForm" (ngSubmit)="onSave()" class="spx-form-body">
      <div class="spx-form-grid spx-form-grid--4">

        <div class="spx-form-field">
          <label class="spx-form-label">
            Código <span class="spx-form-required">*</span>
          </label>
          <input type="number" formControlName="id" class="spx-form-input"
                 placeholder="Ej: 5001"
                 [class.spx-form-input--error]="isValidField('id')">
          @if (isValidField('id')) {
            <span class="spx-form-error">{{ getFieldError('id') }}</span>
          }
        </div>

        <div class="spx-form-field spx-form-col-span-2">
          <label class="spx-form-label">
            Nombre <span class="spx-form-required">*</span>
          </label>
          <input type="text" formControlName="nombre" class="spx-form-input"
                 placeholder="Nombre del municipio"
                 [class.spx-form-input--error]="isValidField('nombre')">
          @if (isValidField('nombre')) {
            <span class="spx-form-error">{{ getFieldError('nombre') }}</span>
          }
        </div>

        <div class="spx-form-field">
          <label class="spx-form-label">
            Departamento <span class="spx-form-required">*</span>
          </label>
          <select formControlName="departamentoId" class="spx-form-select"
                  [class.spx-form-input--error]="isValidField('departamentoId')">
            <option [ngValue]="null">Seleccione...</option>
            @for (depto of departamentos; track depto.id) {
              <option [value]="depto.id">{{ depto.nombre }}</option>
            }
          </select>
          @if (isValidField('departamentoId')) {
            <span class="spx-form-error">{{ getFieldError('departamentoId') }}</span>
          }
        </div>

      </div>

      <div class="spx-form-check">
        <input type="checkbox" class="spx-form-check__input" id="activoMuni"
               formControlName="activo">
        <label class="spx-form-check__label" for="activoMuni">
          <i class="fa-solid fa-circle-check"></i>
          Municipio activo
        </label>
      </div>

      <div class="spx-form-actions">
        <button type="submit" class="spx-form-btn-submit">
          <i class="fa-solid fa-floppy-disk"></i>
          Guardar Municipio
        </button>
      </div>

    </form>
  </div>

  <!-- Lista embebida -->
  <div class="spx-form-embedded">
    <app-listar-municipio-page></app-listar-municipio-page>
  </div>

</div>
