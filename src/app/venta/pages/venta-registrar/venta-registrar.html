<h2 class="mb-2">Nueva Venta</h2>
<hr class="mb-4">

<div class="container" style="max-width: 88rem;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form [formGroup]="myForm" (ngSubmit)="onSave()">

        <div class="row g-3">

          <!-- Tipo de Pedido -->
          <div class="col-md-4">
            <label class="form-label">Tipo de Pedido <span class="text-danger">*</span></label>
            <select formControlName="tipoPedidoId" class="form-select">
              <option [value]="null" disabled selected>Seleccione un tipo</option>
              @for (tipo of tiposPedido; track tipo.id) {
                <option [value]="tipo.id">{{ tipo.nombre }}</option>
              }
            </select>
            @if (isValidField('tipoPedidoId')) {
              <div class="text-danger small mt-1">Este campo es requerido</div>
            }
          </div>

          <!-- Mesa (opcional) -->
          <div class="col-md-4">
            <label class="form-label">Mesa <span class="text-muted">(opcional)</span></label>
            <select formControlName="mesaId" class="form-select">
              <option [value]="null">Sin mesa asignada</option>
              @for (mesa of mesas; track mesa.id) {
                <option [value]="mesa.id">{{ mesa.nombre }}</option>
              }
            </select>
          </div>

          <!-- Factura electrónica DIAN -->
          <div class="col-12">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="solicitaFactura"
                formControlName="solicitaFacturaElectronica"
              />
              <label class="form-check-label fw-semibold" for="solicitaFactura">
                ¿El cliente solicita factura electrónica DIAN?
              </label>
            </div>
          </div>

          <!-- Cliente (visible solo si solicita factura) -->
          @if (solicitaFactura) {
            <div class="col-md-8">
              <label class="form-label">
                Cliente <span class="text-danger">*</span>
                <span class="text-muted small ms-1">(requerido para factura electrónica)</span>
              </label>
              <select formControlName="usuarioClienteId" class="form-select">
                <option [value]="null">Seleccione un cliente</option>
                @for (cliente of clientes; track cliente.id) {
                  <option [value]="cliente.id">
                    {{ cliente.nombre }} {{ cliente.apellido }}
                    @if (cliente.cedula) { · {{ cliente.cedula }} }
                  </option>
                }
              </select>
              <div class="form-text text-muted">
                Los datos fiscales del cliente (cédula/NIT y email) se usarán para generar la factura DIAN.
              </div>
            </div>
          }

        </div>

        <div class="alert alert-info mt-3 mb-0 py-2 small">
          <i class="fas fa-info-circle me-1"></i>
          La venta se creará en estado <strong>ABIERTA</strong> asignada automáticamente
          al usuario activo como creador.
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-primary px-4">
            Abrir Venta
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Lista de ventas -->
  <div class="mt-4">
    <app-venta-listar></app-venta-listar>
  </div>
</div>
