<div
  id="menu"
  class="position-fixed top-0 start-0 h-100 bg-dark text-white-50 overflow-auto"
  [class.d-none]="!isOpen"
  style="width: 220px; z-index: 1050; transition: transform 0.3s ease-in-out;"
>
  <app-side-menu-header></app-side-menu-header>

  <app-side-menu-options (optionSelected)="closeSideMenu()"></app-side-menu-options>

  <button
    class="d-md-none w-100 btn btn-secondary mt-2"
    (click)="closeSideMenu()"
  >
    Cerrar
  </button>
</div>

<style>
  @media (min-width: 768px) {
    #menu {
      position: relative !important;
      display: block !important;
    }
  }
  
  @media (max-width: 767px) {
    #menu {
      transform: translateX(0);
    }
  }
</style>
