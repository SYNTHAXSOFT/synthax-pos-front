<div
  id="spx-sidebar"
  class="spx-sidebar"
  [class.d-none]="!isOpen"
>
  <app-side-menu-header></app-side-menu-header>
  <app-side-menu-options (optionSelected)="closeSideMenu()"></app-side-menu-options>
</div>

<style>
.spx-sidebar {
  width: 256px;
  min-width: 256px;
  height: 100vh;
  background: #1a242f;
  border-right: 1px solid #283543;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  font-family: 'Inter', system-ui, sans-serif;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1050;
}

/* Desktop: sidebar becomes part of flex layout (relative) */
@media (min-width: 768px) {
  #spx-sidebar {
    position: relative !important;
    display: flex !important;
  }
}
</style>
