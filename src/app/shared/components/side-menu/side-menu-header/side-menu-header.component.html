<!-- ── Logo del restaurante ──────────────────────────────────────── -->
<div id="logo" class="my-3 px-3 d-flex align-items-center gap-2">

  <!-- Logo personalizado del restaurante -->
  @if (restauranteLogo) {
    <img
      [src]="restauranteLogo"
      [alt]="restauranteNombre"
      class="rounded"
      style="width: 2.8rem; height: 2.8rem; object-fit: contain; background: white; padding: 3px;">
  } @else {
    <!-- Ícono genérico cuando no hay logo -->
    <div
      class="d-flex align-items-center justify-content-center rounded"
      style="width: 2.8rem; height: 2.8rem; background: var(--brand-primary, #059669); flex-shrink: 0;">
      <i class="fa-solid fa-store text-white" style="font-size: 1.1rem;"></i>
    </div>
  }

  <div>
    <h1 class="fs-6 fw-bold text-white mb-0 lh-sm">
      {{ restauranteNombre }}
    </h1>
    <p class="text-secondary small mb-0" style="font-size: 0.7rem;">SYNTHAX POS</p>
  </div>
</div>

<!-- ── Perfil del usuario ─────────────────────────────────────────── -->
<div id="profile" class="px-3 mb-3">
  <p class="text-secondary small mb-1 fw-semibold">Bienvenido</p>

  <a [routerLink]="homeRoute" class="d-inline-flex align-items-center text-decoration-none">
    <img
      class="rounded-circle"
      style="width: 2rem; height: 2rem; flex-shrink: 0;"
      [src]="'https://ui-avatars.com/api/?name=' + fullName + '&background=3b82f6&color=fff'"
      [alt]="fullName">
    <span class="ms-2 small fw-bold text-white">{{ fullName }}</span>
  </a>
  <p class="text-secondary small mt-1 ms-5 mb-0">{{ userRole }}</p>
</div>

<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }
</style>
