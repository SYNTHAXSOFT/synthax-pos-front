<!-- ── Brand / Restaurant ──────────────────── -->
<div class="spx-smh-brand">
  @if (restauranteLogo) {
    <img
      [src]="restauranteLogo"
      [alt]="restauranteNombre"
      class="spx-smh-brand__logo"
    >
  } @else {
    <div class="spx-smh-brand__icon">
      <i class="fa-solid fa-store"></i>
    </div>
  }
  <div class="spx-smh-brand__text">
    @if (esPropietarioMulti) {
      <!-- Selector de sucursal para propietarios con múltiples restaurantes -->
      <select
        class="spx-smh-brand__select"
        (change)="onCambiarRestaurante($event)"
        title="Cambiar sucursal activa"
      >
        @for (r of restaurantes; track r.id) {
          <option [value]="r.id" [selected]="r.id === restauranteActivoId">{{ r.nombre }}</option>
        }
      </select>
      <p class="spx-smh-brand__sub">Sucursal activa</p>
    } @else {
      <h1 class="spx-smh-brand__name">{{ restauranteNombre }}</h1>
      <p class="spx-smh-brand__sub">SYNTHAX POS</p>
    }
  </div>
</div>

<!-- ── User Profile ───────────────────────── -->
<div class="spx-smh-user">
  <a [routerLink]="homeRoute" class="spx-smh-user__link">
    @if (userFotoPerfil) {
      <img
        class="spx-smh-user__avatar spx-smh-user__avatar--foto"
        [src]="userFotoPerfil"
        [alt]="fullName"
      >
    } @else {
      <img
        class="spx-smh-user__avatar"
        [src]="'https://ui-avatars.com/api/?name=' + fullName + '&background=0d7ff2&color=fff&size=40'"
        [alt]="fullName"
      >
    }
    <div>
      <p class="spx-smh-user__name">{{ fullName }}</p>
      <p class="spx-smh-user__role">{{ userRole }}</p>
    </div>
  </a>
</div>

<style>
.spx-smh-brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1.25rem 1.25rem 1rem;
  border-bottom: 1px solid #283543;
}
.spx-smh-brand__logo {
  width: 2.5rem; height: 2.5rem;
  object-fit: contain; border-radius: 0.5rem;
  background: white; padding: 3px; flex-shrink: 0;
}
.spx-smh-brand__icon {
  width: 2.5rem; height: 2.5rem;
  border-radius: 0.5rem; background: #0d7ff2;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 1rem; flex-shrink: 0;
}
.spx-smh-brand__text { min-width: 0; flex: 1; }
.spx-smh-brand__name {
  font-size: 0.9rem; font-weight: 700; color: #f1f5f9;
  margin: 0; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.spx-smh-brand__sub {
  font-size: 0.65rem; color: #475569; margin: 0;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.spx-smh-brand__select {
  width: 100%;
  background: #1a2635;
  border: 1px solid #283543;
  border-radius: 6px;
  color: #f1f5f9;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 0.3rem 0.5rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 2px;
}
.spx-smh-brand__select:hover,
.spx-smh-brand__select:focus {
  border-color: #0d7ff2;
}
.spx-smh-user {
  padding: 0.875rem 1.25rem;
  border-bottom: 1px solid #283543;
}
.spx-smh-user__link {
  display: flex; align-items: center; gap: 0.625rem; text-decoration: none;
}
.spx-smh-user__avatar { width: 2rem; height: 2rem; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
.spx-smh-user__avatar--foto { border: 1.5px solid #283543; }
.spx-smh-user__name { font-size: 0.8rem; font-weight: 600; color: #f1f5f9; margin: 0; line-height: 1.3; }
.spx-smh-user__role { font-size: 0.68rem; color: #64748b; margin: 0; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
