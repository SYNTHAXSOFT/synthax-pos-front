<div class="container-fluid px-4">
  <h2 class="mb-2">Lista de Impuestos</h2>
  <hr class="mb-4">

  @if (cargando) {
    <div class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (!cargando) {
    <div class="table-responsive">
      <table class="table table-striped table-hover table-bordered">
        <thead class="table-light">
          <tr>
            <th>Descripción</th>
            <th>Porcentaje</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (impuesto of impuestos; track impuesto.id) {
            <tr>
              <td>{{ impuesto.descripcion }}</td>
              <td>{{ impuesto.porcentajeImpuesto }} %</td>
              <td>
                <span [class]="impuesto.estado === 'ACTIVO' ? 'badge bg-success' : 'badge bg-danger'">
                  {{ impuesto.estado }}
                </span>
              </td>
              <td>
                <button class="btn btn-info btn-sm me-1" (click)="editar(impuesto.id)">
                  Editar
                </button>
                <button
                  class="btn btn-warning btn-sm"
                  (click)="desactivar(impuesto.id)"
                  [disabled]="impuesto.estado !== 'ACTIVO'"
                >
                  Desactivar
                </button>
              </td>
            </tr>
          }
          @empty {
            <tr>
              <td colspan="4" class="text-center text-muted py-4">
                No hay impuestos registrados
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
